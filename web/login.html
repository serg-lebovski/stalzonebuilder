<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — StalZone Builder</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
<div class="auth-box">
  <div class="auth-logo">
    <span class="logo-icon">☢</span>
    <span class="logo-text">StalZone <span class="logo-accent">Builder</span></span>
  </div>
  <h2 class="auth-title">Вход</h2>
  <div class="auth-error" id="err">{{error}}</div>
  <form method="POST" action="/login" class="auth-form">
    <label>
      <span>Логин</span>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      <span>Пароль</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="btn-auth">Войти</button>
  </form>
  <p class="auth-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>
<script>
  const e = document.getElementById('err');
  if (!e.textContent.trim()) e.style.display = 'none';
</script>
</body>
</html>
